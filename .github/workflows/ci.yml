name: Monorepo CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: employee-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: employee-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: |
          find . \
            -path './node_modules' -prune -o \
            -name '*.js' -print0 | xargs -0 -n1 node --check

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: employee-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: employee-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm test -- --run
        continue-on-error: true

      - name: Build
        run: npm run build

  reports:
    name: Reports Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: employee-reports-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall app

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api, frontend, reports]

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: employee-api
            context: ./employee-api
          - name: employee-frontend
            context: ./employee-frontend
          - name: employee-reports-service
            context: ./employee-reports-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: ${{ matrix.service.name }}:ci
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI env files
        run: |
          cp env/api.env.example env/api.env
          cp env/reports.env.example env/reports.env

      - name: Validate production Compose config
        run: docker compose -f docker-compose.prod.yml config
