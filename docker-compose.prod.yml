services:
  employee-api:
    build:
      context: ./employee-api
      dockerfile: Dockerfile
    env_file:
      - ./env/api.env
    restart: unless-stopped
    expose:
      - "5000"
    # Production: keep the API private on employee-network and let frontend nginx proxy /api/v1.
    # Debug only: temporarily uncomment the port mapping below if direct host access is needed.
    # ports:
    #   - "5000:5000"
    networks:
      - employee-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  employee-reports-service:
    build:
      context: ./employee-reports-service
      dockerfile: Dockerfile
    env_file:
      - ./env/reports.env
    restart: unless-stopped
    expose:
      - "8001"
    # Production: keep reports private on employee-network and let frontend nginx proxy /api/reports.
    # Debug only: temporarily uncomment the port mapping below if direct host access is needed.
    # ports:
    #   - "8001:8001"
    networks:
      - employee-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  employee-frontend:
    build:
      context: ./employee-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      employee-api:
        condition: service_healthy
      employee-reports-service:
        condition: service_healthy
    networks:
      - employee-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  employee-network:
    name: employee-network
    driver: bridge
